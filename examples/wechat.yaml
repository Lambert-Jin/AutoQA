name: 今日头条评论区测试
device:
  type: android
config:
  action_model:
    provider: autoglm
    base_url: ${AUTOGLM_BASE_URL}
    api_key: ${AUTOGLM_API_KEY}
    model: autoglm-phone
  vlm:
    provider: gemini
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
tasks:
- name: 今日头条评论区话题横幅检查
  flow:
  - action: 打开今日头条 App
    timeout: 15
  - assert: 页面显示今日头条首页内容
  - action: 在首页向上滑动屏幕
  - action: 点击屏幕最下分的文章进入详情页
  - action: 点击评论区图标进入评论区
  - assert: 评论区顶部存在一个浅灰色背景的话题横幅，且横幅右边有一个红色的按钮，上面写着'去发布'

- name: 今日头条评论区话题横幅检查
  flow:
    - action: 打开今日头条 App
      timeout: 15
    - assert: 页面显示今日头条首页内容
    - action: 在首页向上滑动屏幕
    - action: 点击屏幕最下分的文章进入详情页
    - action: 点击评论区图标进入评论区
    - action: 发送一条不少于15字的评论
    - assert: 评论发送后，屏幕上出现一个弹窗
