name: 今日头条评论区话题横幅检查
device:
  type: android
config:
  action_model:
    provider: autoglm
    base_url: ${AUTOGLM_BASE_URL}
    api_key: ${AUTOGLM_API_KEY}
    model: autoglm-phone
  vlm:
    provider: gemini
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
tasks:
- name: 今日头条评论区话题横幅检查
  flow:
  - action: 打开今日头条 App
    timeout: 15
  - assert: 页面显示今日头条首页内容
    retryOnFail: true
    retryCleanup: 关闭可能出现的青少年模式、升级提示或广告弹窗
  - action: 在首页向下滑动屏幕
  - action: 点击任意一篇文章进入详情页
  - assert: 页面成功跳转并显示文章正文内容
  - action: 点击页面底部的评论区图标进入评论区
  - assert: 评论区顶部存在一个白色背景的话题横幅，且横幅右边有一个红色的按钮，上面写着'去发布'
