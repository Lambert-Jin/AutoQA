# 今日头条评论区红包横幅测试
name: 今日头条评论区红包横幅测试

device:
  type: android
  # id: "emulator-5554"   # 可选，不指定则自动检测

config:
  autoglm:
    base_url: "${AUTOGLM_BASE_URL}"
    api_key: "${AUTOGLM_API_KEY}"
    model: "autoglm-phone"
  vlm:
    provider: "gemini"
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-2.5-flash"

tasks:
  - name: 评论区红包横幅验证
    flow:
      - action: "打开今日头条 App"
        timeout: 15

      - action: "点击推荐页面中的第一篇文章"

      - action: "点击评论图标进入评论区"

      - assert: "评论区顶部出现了一个红色横幅"
        severity: critical
#        retryOnFail: true
#        retryCleanup: "关闭弹窗或广告"
